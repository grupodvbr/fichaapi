<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Receitas • Fichas Técnicas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  height:100%;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ===== SCROLL ===== */
body{
  display:flex;
  flex-direction:column;
}

.grid{
  overflow:auto;
  flex:1;
  padding:14px;
}

/* ===== HEADER ===== */
.filters{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-bottom:1px solid var(--border);
}

/* ===== INPUT ===== */
.filters input,
.filters select{
  height:48px;
  border-radius:14px;
  border:1px solid var(--border);
  padding:0 14px;
  font-size:14px;
  font-weight:600;
  background:#fff;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  transition:.2s;
}

.card:active{
  transform:scale(.97);
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.card-body h3{
  font-size:14px;
  margin:0;
  font-weight:800;
}

/* ===== BADGES ===== */
.badges{
  display:flex;
  gap:6px;
  margin-top:6px;
  flex-wrap:wrap;
}

.badge{
  font-size:10px;
  padding:5px 8px;
  border-radius:999px;
  font-weight:800;
}

.badge.ok{
  background:#dcfce7;
  color:#166534;
}

.badge.warn{
  background:#fee2e2;
  color:#991b1b;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:50;
}

.modal-box{
  background:#fff;
  height:100%;
  overflow:auto;
}

.modal img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* ===== CONTENT ===== */
.modal-body{
  padding:16px;
}

.modal-body h2{
  margin:0 0 8px;
  font-size:20px;
}

/* ===== TEXTAREA ===== */
textarea{
  width:100%;
  min-height:140px;
  border-radius:12px;
  border:1px solid var(--border);
  padding:12px;
  font-size:13px;
  font-weight:600;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  font-weight:900;
  margin-top:10px;
}

.btn-save{
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:#fff;
}

/* ===== UPLOAD ===== */
.upload label{
  height:48px;
  border-radius:12px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}

/* ===== INGREDIENTES ===== */
.ing{
  padding:8px 0;
  border-bottom:1px dashed var(--border);
  font-size:13px;
}

/* ===== CLOSE ===== */
.close{
  position:absolute;
  top:10px;
  right:14px;
  font-size:22px;
  color:#fff;
  font-weight:900;
}
</style>
</head>

<body>

<!-- ================= FILTROS ================= -->
<div class="filters">
  <input id="filtroNome" placeholder="🔍 BUSCAR PRATO">
  <select id="filtroTipo">
    <option value="">🍽 TODOS OS TIPOS</option>
    <option>SUSHI</option>
    <option>DRINK</option>
    <option>ENTRADA</option>
    <option>PRATO PRINCIPAL</option>
    <option>SOBREMESA</option>
    <option>ACOMPANHAMENTO</option>
  </select>
  <select id="filtroReceita">
    <option value="">📋 TODAS</option>
    <option value="COM">COM RECEITA</option>
    <option value="SEM">SEM RECEITA</option>
  </select>
</div>

<div id="cards" class="grid"></div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal" onclick="fechar()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <span class="close" onclick="fechar()">✕</span>
    <img id="mFoto">
    <div id="mBody" class="modal-body"></div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let pratos = [];
let pratoAtual = null;

async function carregar(){
  const { data } = await sb.from("buffet").select("*").order("nome");
  pratos = data || [];
  render();
}

function render(){
  cards.innerHTML = "";

  const nome = filtroNome.value.toUpperCase();
  const tipo = filtroTipo.value;
  const receita = filtroReceita.value;

  for(const p of pratos){
    if(nome && !p.nome.toUpperCase().includes(nome)) continue;
    if(tipo && p.tipo !== tipo) continue;
    if(receita==="COM" && !p.modo_preparo) continue;
    if(receita==="SEM" && p.modo_preparo) continue;

    const c = document.createElement("div");
    c.className="card";
    c.onclick=()=>abrir(p);

    c.innerHTML=`
      ${p.foto_url ? `<img src="${p.foto_url}">` : ``}
      <div class="card-body">
        <h3>${p.nome}</h3>
        <div class="badges">
          <span class="badge">${p.tipo||"-"}</span>
          ${p.modo_preparo
            ? `<span class="badge ok">COM RECEITA</span>`
            : `<span class="badge warn">SEM RECEITA</span>`}
        </div>
      </div>`;
    cards.appendChild(c);
  }
}

async function abrir(p){
  pratoAtual = p;
  modal.style.display="flex";
  mFoto.src = p.foto_url || "";

  const { data: itens } = await sb
    .from("buffet_itens")
    .select("*")
    .eq("buffet_id", p.id);

  mBody.innerHTML=`
<h2>${p.nome}</h2>

<div class="upload">

  <label for="fotoInput">
    📷 ADICIONAR / TROCAR FOTO
  </label>

  <input type="file"
    id="fotoInput"
    accept="image/*"
    onchange="uploadFoto(event)"
  >

</div>
    <h3>MODO DE PREPARO</h3>
    <textarea id="receitaInput"
      placeholder="DESCREVA A RECEITA COMPLETA AQUI...">${p.modo_preparo||""}</textarea>

    <button class="btn btn-save" onclick="salvarReceita()">
      SALVAR RECEITA
    </button>

    <h3>INGREDIENTES</h3>
    ${itens.map(i=>`
      <div class="ing">
        ${i.nome} — ${i.quantidade} ${i.unidade_uso}
      </div>
    `).join("")}
  `;
}

async function salvarReceita(){
  const texto = receitaInput.value.trim().toUpperCase();
  await sb.from("buffet")
    .update({ modo_preparo: texto })
    .eq("id", pratoAtual.id);

  await carregar();
  fechar();
}

function fechar(){
  modal.style.display="none";
}

filtroNome.oninput = render;
filtroTipo.onchange = render;
filtroReceita.onchange = render;

carregar();

async function uploadFoto(e){

  const file = e.target.files[0];
  if(!file) return;

  const nomeArquivo =
    pratoAtual.id + "-" + Date.now() + ".jpg";

  const { error } = await sb
    .storage
    .from("buffet")
    .upload(nomeArquivo, file, {
      cacheControl: "3600",
      upsert: true
    });

  if(error){
    alert("Erro ao enviar imagem");
    console.error(error);
    return;
  }

  const { data } = sb
    .storage
    .from("buffet")
    .getPublicUrl(nomeArquivo);

  const url = data.publicUrl;

  await sb
    .from("buffet")
    .update({ foto_url: url })
    .eq("id", pratoAtual.id);

  mFoto.src = url;

  await carregar();
}
</script>

</body>
</html>
