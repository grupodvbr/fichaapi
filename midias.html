<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mídias de Promoção • Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* =========================================================
   EXECUTIVO COM GRID ROLÁVEL
========================================================= */
:root{
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#dc2626;

  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;

  --radius:16px;

  --shadow-sm:0 4px 12px rgba(0,0,0,.06);
  --shadow-md:0 12px 30px rgba(0,0,0,.10);
}

*{
  box-sizing:border-box;
}

html,body{
  height:100vh;
  overflow:hidden;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  color:var(--text);
}

/* HEADER */
.header{
  height:65px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}

.header h1{
  margin:0;
  font-size:18px;
  font-weight:900;
}

/* LAYOUT */
.container{
  flex:1;
  display:grid;
  grid-template-columns:360px 1fr;
  gap:20px;
  padding:20px;
  overflow:hidden;
}

/* PAINEL ESQUERDO */
.panel{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow:var(--shadow-sm);
}

.panel h2{
  font-size:13px;
  font-weight:900;
  margin:0;
  color:var(--primary);
}

/* INPUTS */
label{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
}

input,select{
  height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  padding:0 10px;
  font-size:12px;
  font-weight:600;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.days{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.day{
  padding:5px 10px;
  font-size:10px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-weight:700;
}

.day.active{
  border-color:var(--primary);
  background:#dbeafe;
  color:var(--primary);
}

.preview{
  height:100px;
  border-radius:12px;
  border:2px dashed var(--border);
  display:grid;
  place-items:center;
  font-size:11px;
  overflow:hidden;
}

.preview img,
.preview video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* BOTÕES */
button{
  height:34px;
  border:none;
  border-radius:10px;
  font-weight:800;
  font-size:11px;
  cursor:pointer;
}

button.primary{
  background:var(--primary);
  color:#fff;
}

button.danger{
  background:#fee2e2;
  color:#991b1b;
}

/* DIREITA */
.right-area{
  display:flex;
  flex-direction:column;
  height:100%;
  overflow:hidden;
}

.search-bar{
  height:40px;
  margin-bottom:12px;
  flex-shrink:0;
}

.search-bar input{
  width:100%;
  height:100%;
}

/* GRID COM SCROLL PRÓPRIO */
.grid{
  flex:1;
  overflow-y:auto;
  padding-right:6px;

  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* SCROLL BONITO */
.grid::-webkit-scrollbar{
  width:8px;
}
.grid::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:10px;
}

/* CARD PEQUENO */
.card{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow-sm);
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-md);
}

.media{
  height:110px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.media img,
.media video{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.meta{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:4px;
  font-size:11px;
}

.badge{
  font-size:9px;
  font-weight:900;
  padding:3px 6px;
  border-radius:999px;
  background:#dbeafe;
  color:var(--primary);
}

.badge.on{
  background:#dcfce7;
  color:#166534;
}

.badge.off{
  background:#f1f5f9;
  color:#64748b;
}

.actions{
  display:flex;
  gap:4px;
  padding:8px;
}

button.edit{
  background:#e0e7ff;
  color:#3730a3;
}
</style>
</head>
<body>

<div class="header">
  <h1>Mídias do cardápio</h1>
  <button class="primary" onclick="openBuffetModal()">🍽️ Itens do Cardápio</button>
</div>

<div class="container">
  <div class="panel">
    <h2>NOVA PROMOÇÃO</h2>
    <label>Arquivo (imagem ou vídeo)</label>
    <input id="file" type="file" accept="image/*,video/*">
    <div class="row">
      <div>
        <label>Tipo</label>
        <select id="tipo"><option value="IMG">Imagem</option><option value="VIDEO">Vídeo</option></select>
      </div>
      <div>
        <label>Horário</label>
        <div class="row">
          <input id="hora_inicio" type="time" value="00:00">
          <input id="hora_fim" type="time" value="23:59">
        </div>
      </div>
    </div>
    <label>Dias da semana</label>
    <div class="days" id="dias">
      <div class="day" data-v="1">Seg</div><div class="day" data-v="2">Ter</div><div class="day" data-v="3">Qua</div>
      <div class="day" data-v="4">Qui</div><div class="day" data-v="5">Sex</div><div class="day" data-v="6">Sáb</div><div class="day" data-v="7">Dom</div>
    </div>
    <div class="preview" id="preview">Pré-visualização</div>
    <button class="primary" onclick="addPromo()">📤 Upload & Salvar</button>
  </div>
  <div><div class="grid" id="grid"></div></div>
</div>

<script>
const sb = supabase.createClient("https://dxkszikemntfusfyrzos.supabase.co","sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed");
const fileInput=document.getElementById("file"), tipoInput=document.getElementById("tipo"), horaInicioInput=document.getElementById("hora_inicio"), horaFimInput=document.getElementById("hora_fim"), preview=document.getElementById("preview"), grid=document.getElementById("grid");
let diasSel=[];
document.querySelectorAll(".day").forEach(d=>d.onclick=()=>{d.classList.toggle("active");const v=+d.dataset.v;diasSel.includes(v)?diasSel=diasSel.filter(x=>x!==v):diasSel.push(v);});
fileInput.onchange=()=>{const f=fileInput.files[0];if(!f)return;preview.innerHTML=f.type.startsWith("video")?`<video src="${URL.createObjectURL(f)}" autoplay muted loop playsinline></video>`:`<img src="${URL.createObjectURL(f)}">`;};
const diasLabel=d=>({1:"Seg",2:"Ter",3:"Qua",4:"Qui",5:"Sex",6:"Sáb",7:"Dom"}[d]||d);
async function load(){const{data}=await sb.from("promocoes").select("*").order("created_at",{ascending:false});grid.innerHTML=(data||[]).map(p=>`<div class="card"><div class="media">${p.tipo==="VIDEO"?`<video src="${p.url}" muted autoplay loop playsinline></video>`:`<img src="${p.url}">`}</div><div class="meta"><span class="badge ${p.ativo?'on':'off'}">${p.tipo} • ${p.ativo?'ON':'OFF'}</span><div class="info">📅 ${(p.dias_semana||[]).map(diasLabel).join(", ")||"—"}<br/>⏰ ${p.hora_inicio} → ${p.hora_fim}</div></div><div class="actions"><button class="toggle ${p.ativo?'on':'off'}" onclick="toggle('${p.id}',${p.ativo})">${p.ativo?'Desativar':'Ativar'}</button><button class="danger" onclick="delPromo('${p.id}','${p.url}')">Excluir</button></div></div>`).join("");}
async function addPromo(){const f=fileInput.files[0];if(!f||!diasSel.length)return alert("Arquivo e dias obrigatórios");const ext=f.name.split(".").pop();const path=`promocoes/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;await sb.storage.from("promocoes").upload(path,f,{upsert:false});const{data:urlData}=sb.storage.from("promocoes").getPublicUrl(path);await sb.from("promocoes").insert({url:urlData.publicUrl,tipo:tipoInput.value,dias_semana:diasSel,hora_inicio:horaInicioInput.value,hora_fim:horaFimInput.value,ativo:true});fileInput.value="";preview.innerHTML="Pré-visualização";diasSel=[];document.querySelectorAll(".day").forEach(d=>d.classList.remove("active"));load();}
async function toggle(id,ativo){await sb.from("promocoes").update({ativo:!ativo}).eq("id",id);load();}
async function delPromo(id,url){if(!confirm("Excluir mídia?"))return;const path=url.split("/storage/v1/object/public/promocoes/")[1];if(path)await sb.storage.from("promocoes").remove([path]);await sb.from("promocoes").delete().eq("id",id);load();}
load();

let buffetItems=[],currentEdit=null;
function openBuffetModal(){document.body.classList.add("modal-open");document.getElementById("buffetModal").classList.add("open");loadBuffet();}
function closeBuffetModal(){document.body.classList.remove("modal-open");document.getElementById("buffetModal").classList.remove("open");}
async function loadBuffet(){const{data}=await sb.from("buffet").select("id,nome,descricao,foto_url,ativo,cardapio,tipo").eq("ativo",true).order("nome");buffetItems=data||[];renderBuffet();}
function renderBuffet(){const term=buscaBuffet.value.toLowerCase();const setor=filtroSetor.value;buffetList.innerHTML=buffetItems.filter(i=>(i.nome||"").toLowerCase().includes(term)&&(!setor||i.tipo===setor)).map(i=>`<div class="buffet-item" onclick="selectItem('${i.id}')"><img src="${i.foto_url||''}"><div><b>${i.nome}</b><br><small>${i.descricao||''}</small><br><small style="opacity:.6">${i.tipo||'Sem setor'}</small></div><button class="toggle ${i.cardapio?'on':'off'}" onclick="toggleCardapio(event,'${i.id}',${i.cardapio})">${i.cardapio?'NO CARDÁPIO':'FORA'}</button></div>`).join("");}
function selectItem(id){currentEdit=buffetItems.find(i=>i.id===id);editNome.value=currentEdit.nome||"";editDesc.value=currentEdit.descricao||"";}
async function toggleCardapio(ev,id,atual){ev.stopPropagation();await sb.from("buffet").update({cardapio:!atual}).eq("id",id);loadBuffet();}
async function salvarItem(){if(!currentEdit)return alert("Selecione um item");let foto_url=currentEdit.foto_url;const f=editFoto.files[0];if(f){const ext=f.name.split(".").pop();const path=`buffet/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;await sb.storage.from("buffet").upload(path,f,{upsert:false});foto_url=sb.storage.from("buffet").getPublicUrl(path).data.publicUrl;}await sb.from("buffet").update({nome:editNome.value,descricao:editDesc.value,foto_url}).eq("id",currentEdit.id);editFoto.value="";currentEdit=null;loadBuffet();}
</script>

<div id="buffetModal" class="modal" onclick="if(event.target.id==='buffetModal')closeBuffetModal()">
  <div class="modal-box">
    <div class="buffet-wrap">
      <div class="filters">
        <input id="buscaBuffet" placeholder="Buscar item..." oninput="renderBuffet()">
        <select id="filtroSetor" onchange="renderBuffet()">
          <option value="">Todos</option>
          <option value="SUSHI">Sushi</option>
          <option value="PIZZA">Pizza</option>
          <option value="MASSAS">Massas</option>
          <option value="BEBIDAS">Bebidas</option>
        </select>
      </div>
      <div id="buffetList" class="buffet-list"></div>
    </div>
    <div class="edit">
      <h3>Editar Item</h3>
      <input id="editNome" placeholder="Nome">
      <textarea id="editDesc" placeholder="Descrição"></textarea>
      <input id="editFoto" type="file" accept="image/*">
      <button class="primary" onclick="salvarItem()">Salvar alterações</button>
      <button onclick="closeBuffetModal()">Fechar</button>
    </div>
  </div>
</div>

</body>
</html>
