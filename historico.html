<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover"/>

<title>Auditoria • Sistema CMV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --danger:#dc2626;
  --success:#16a34a;
  --warning:#f59e0b;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --radius:16px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(180deg,#f8fafc,#eef2f7);
  color:var(--text);
  overflow-x:hidden;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:auto;
  padding:25px 20px;
}

h1{
  margin:0;
  font-size:24px;
  font-weight:900;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:var(--radius);
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.card small{
  font-size:11px;
  color:var(--muted);
}

.card strong{
  display:block;
  font-size:20px;
  margin-top:4px;
}

/* FILTROS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:12px;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}

.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-secondary{background:#e2e8f0}

/* TABLE */
.table-wrap{
  background:#fff;
  border-radius:var(--radius);
  overflow:auto;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

th{
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  background:#f8fafc;
}

.badge{
  padding:4px 8px;
  border-radius:999px;
  font-size:9px;
  font-weight:800;
}

.insert{background:#dcfce7;color:#166534}
.update{background:#fef9c3;color:#854d0e}
.delete{background:#fee2e2;color:#991b1b}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(5px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:800px;
  max-height:85vh;
  overflow:auto;
  border-radius:16px;
  padding:20px;
}

.toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  display:none;
  font-size:12px;
}

/* MOBILE */
@media(max-width:900px){
  .cards{grid-template-columns:repeat(2,1fr)}
  td:last-child{display:flex;flex-direction:column;gap:5px}
}
</style>
</head>

<body>

<div class="container">

<h1>Auditoria e Backup</h1>
<div class="subtitle">Filtro padrão: Últimos 7 dias</div>

<div class="cards">
  <div class="card"><small>Total</small><strong id="total">0</strong></div>
  <div class="card"><small>Inserts</small><strong id="ins">0</strong></div>
  <div class="card"><small>Updates</small><strong id="upd">0</strong></div>
  <div class="card"><small>Deletes</small><strong id="del">0</strong></div>
</div>

<div class="filters">
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">
  <select id="filtroTabela"><option value="">Todas Tabelas</option></select>
  <select id="filtroOperacao">
    <option value="">Todas Operações</option>
    <option value="INSERT">INSERT</option>
    <option value="UPDATE">UPDATE</option>
    <option value="DELETE">DELETE</option>
  </select>
  <input type="text" id="buscaId" placeholder="Buscar ID">
  <button class="btn-primary" onclick="carregar()">Filtrar</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Data</th>
<th>Tabela</th>
<th>Op</th>
<th>ID</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="btn-secondary" onclick="fechar()">Fechar</button>
<div id="conteudo"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

function fechar(){
  modal.style.display="none";
}

function ultimaSemana(){
  const hoje=new Date();
  const inicio=new Date();
  inicio.setDate(hoje.getDate()-7);
  dataInicio.value=inicio.toISOString().slice(0,10);
  dataFim.value=hoje.toISOString().slice(0,10);
}

async function carregar(){

  let query = sb.from("historico_alteracao_fichas").select("*");

  if(dataInicio.value)
    query=query.gte("alterado_em",dataInicio.value+"T00:00:00");

  if(dataFim.value)
    query=query.lte("alterado_em",dataFim.value+"T23:59:59");

  if(filtroTabela.value)
    query=query.eq("tabela",filtroTabela.value);

  if(filtroOperacao.value)
    query=query.eq("operacao",filtroOperacao.value);

  if(buscaId.value)
    query=query.ilike("registro_id","%"+buscaId.value+"%");

  const {data,error}=await query.order("alterado_em",{ascending:false}).limit(500);

  if(error){toast(error.message);return;}

  tbody.innerHTML="";
  total.innerText=data.length;

  let i=0,u=0,d=0;

  const tabelas=new Set();

  data.forEach(r=>{
    tabelas.add(r.tabela);

    if(r.operacao==="INSERT") i++;
    if(r.operacao==="UPDATE") u++;
    if(r.operacao==="DELETE") d++;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(r.alterado_em).toLocaleString()}</td>
      <td>${r.tabela}</td>
      <td><span class="badge ${r.operacao.toLowerCase()}">${r.operacao}</span></td>
      <td>${r.registro_id}</td>
      <td>
        <button class="btn-secondary" onclick='ver(${JSON.stringify(r)})'>Ver</button>
        <button class="btn-danger" onclick="restaurar('${r.id}')">Restaurar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  ins.innerText=i;
  upd.innerText=u;
  del.innerText=d;

  filtroTabela.innerHTML='<option value="">Todas Tabelas</option>';
  tabelas.forEach(t=>{
    filtroTabela.innerHTML+=`<option value="${t}">${t}</option>`;
  });
}

function ver(item){
  modal.style.display="flex";
  conteudo.innerHTML=`<pre>${JSON.stringify(item,null,2)}</pre>`;
}

async function restaurar(id){
  const senha=prompt("Senha:");
  if(senha!=="8486"){toast("Senha incorreta");return;}

  const {error}=await sb.rpc("restaurar_historico",{p_id:id});
  if(error){toast(error.message);return;}

  toast("Restaurado com sucesso");
  carregar();
}

ultimaSemana();
carregar();

/* BLOQUEIO TOTAL DE ZOOM */
document.addEventListener('gesturestart', e=>e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){
  const now=new Date().getTime();
  if(now-lastTouchEnd<=300){e.preventDefault();}
  lastTouchEnd=now;
},{passive:false});
document.addEventListener('wheel',e=>{
  if(e.ctrlKey)e.preventDefault();
},{passive:false});
</script>

</body>
</html>
