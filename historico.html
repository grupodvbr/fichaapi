<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover"/>

<title>Auditoria • Sistema CMV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --danger:#dc2626;
  --success:#16a34a;
  --warning:#f59e0b;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#fff;
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  z-index:10;
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:900;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:20px;
}

.card{
  background:linear-gradient(135deg,#fff,#f8fafc);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card small{
  color:var(--muted);
  font-size:11px;
}

.card strong{
  display:block;
  font-size:22px;
  margin-top:4px;
}

/* FILTROS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

input,select{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:12px;
}

button{
  border:none;
  padding:8px 14px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:12px;
}

.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-secondary{background:#e2e8f0}

/* TABLE */
.table-wrap{
  background:#fff;
  border-radius:var(--radius);
  overflow:auto;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
  margin-top:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
}

th{
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  background:#f8fafc;
}

.badge{
  padding:4px 8px;
  border-radius:999px;
  font-size:9px;
  font-weight:800;
}

.insert{background:#dcfce7;color:#166534}
.update{background:#fef9c3;color:#854d0e}
.delete{background:#fee2e2;color:#991b1b}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:700px;
  max-height:85vh;
  overflow:auto;
  border-radius:16px;
  padding:20px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:10px 18px;
  border-radius:10px;
  display:none;
  font-size:12px;
}

/* MOBILE */
@media(max-width:900px){
  .cards{grid-template-columns:repeat(2,1fr)}
  td:last-child{display:flex;flex-direction:column;gap:6px}
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Auditoria Executiva • Sistema CMV</h1>
</div>

<div class="container">

<div class="cards">
  <div class="card"><small>Total</small><strong id="total">0</strong></div>
  <div class="card"><small>Inserts</small><strong id="ins">0</strong></div>
  <div class="card"><small>Updates</small><strong id="upd">0</strong></div>
  <div class="card"><small>Deletes</small><strong id="del">0</strong></div>
</div>

<div class="filters">
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">
  <select id="filtroOperacao">
    <option value="">Todas Operações</option>
    <option value="INSERT">INSERT</option>
    <option value="UPDATE">UPDATE</option>
    <option value="DELETE">DELETE</option>
  </select>
  <input type="text" id="buscaId" placeholder="Buscar ID">
  <button class="btn-primary" onclick="carregar()">Filtrar</button>
</div>

<canvas id="grafico" height="80"></canvas>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Data</th>
<th>Tabela</th>
<th>Operação</th>
<th>ID</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="btn-secondary" onclick="fechar()">Fechar</button>
<div id="conteudo"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let chart;

function ultimaSemana(){
  const hoje=new Date();
  const inicio=new Date();
  inicio.setDate(hoje.getDate()-7);
  dataInicio.value=inicio.toISOString().slice(0,10);
  dataFim.value=hoje.toISOString().slice(0,10);
}

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

function fechar(){
  modal.style.display="none";
}

async function carregar(){

  let query = sb.from("historico_alteracao_fichas").select("*");

  query=query.gte("alterado_em",dataInicio.value+"T00:00:00")
             .lte("alterado_em",dataFim.value+"T23:59:59");

  if(filtroOperacao.value)
    query=query.eq("operacao",filtroOperacao.value);

  if(buscaId.value)
    query=query.ilike("registro_id","%"+buscaId.value+"%");

  const {data,error}=await query.order("alterado_em",{ascending:false}).limit(500);

  if(error){toast(error.message);return;}

  tbody.innerHTML="";
  total.innerText=data.length;

  let i=0,u=0,d=0;
  const dias={};

  data.forEach(r=>{
    const dia=r.alterado_em.slice(0,10);
    if(!dias[dia]) dias[dia]=0;
    dias[dia]++;

    if(r.operacao==="INSERT") i++;
    if(r.operacao==="UPDATE") u++;
    if(r.operacao==="DELETE") d++;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(r.alterado_em).toLocaleString()}</td>
      <td>${r.tabela}</td>
      <td><span class="badge ${r.operacao.toLowerCase()}">${r.operacao}</span></td>
      <td>${r.registro_id}</td>
      <td>
        <button class="btn-secondary" onclick='ver(${JSON.stringify(r)})'>Ver</button>
        <button class="btn-danger" onclick="restaurar('${r.id}')">Restaurar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  ins.innerText=i;
  upd.innerText=u;
  del.innerText=d;

  atualizarGrafico(dias);
}

function atualizarGrafico(dias){
  const labels=Object.keys(dias).sort();
  const valores=labels.map(l=>dias[l]);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Alterações por Dia',
        data:valores
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}}
    }
  });
}

function ver(item){
  modal.style.display="flex";
  conteudo.innerHTML=`<pre>${JSON.stringify(item,null,2)}</pre>`;
}

async function restaurar(id){
  const senha=prompt("Senha:");
  if(senha!=="8486"){toast("Senha incorreta");return;}

  const {error}=await sb.rpc("restaurar_historico",{p_id:id});
  if(error){toast(error.message);return;}

  toast("Restaurado com sucesso");
  carregar();
}

ultimaSemana();
carregar();

/* BLOQUEIO ZOOM */
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('wheel',e=>{if(e.ctrlKey)e.preventDefault();},{passive:false});
</script>

</body>
</html>
