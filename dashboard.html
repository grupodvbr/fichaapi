<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CB SYSTEMS®</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c2b8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#020617;
  --grid:#1e293b;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --danger:#ef4444;
  --radius:22px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Inter,system-ui,Arial,sans-serif;
  color:var(--text);
  background:var(--bg);
  overflow-x:hidden;
}

/* ================= LOGIN HERO ================= */

.login-hero{
  position:fixed;
  inset:0;
  background:
    radial-gradient(1200px 600px at 10% -10%, #0b1220 0%, #020617 60%);
}

.hero-overlay{
  width:100%;
  height:100%;
  background:
    linear-gradient(180deg, rgba(2,6,23,.25), rgba(2,6,23,.45)),
    radial-gradient(800px 400px at 20% 0%, rgba(34,197,94,.15), transparent 60%);
  padding:14px 24px;
}

.hero-top{
  max-width:1400px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.hero-title h1{
  margin:0;
  font-size:28px;
  font-weight:900;
  color:#fff;
}

.hero-title p{
  margin:4px 0 0;
  color:#cbd5e1;
  font-size:13px;
  font-weight:600;
}

.hero-actions{
  display:flex;
  gap:12px;
}

.btn{
  border-radius:999px;
  padding:9px 14px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  border:none;
}

.btn.primary{
  color:#022c22;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 16px 44px rgba(34,197,94,.45);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(2,6,23,.7);
  backdrop-filter:blur(8px);
  z-index:999;
}

.modal.open{display:grid}

.modal-box{
  width:100%;
  max-width:420px;
  background:#020617;
  border:1px solid var(--grid);
  border-radius:26px;
  padding:26px;
}

.field input{
  width:100%;
  margin-top:6px;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--grid);
  background:#0b1220;
  color:#fff;
}

/* ================= APP ================= */

.app{
  display:grid;
  grid-template-columns:88px 1fr;
  height:100vh;
  display:none;
}

/* DESKTOP SIDEBAR */
.sidebar{
  background:linear-gradient(180deg,#00c2b8,#00a6a0);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:22px 0;
  gap:18px;
}

.icon{
  width:48px;
  height:48px;
  border-radius:16px;
  background:rgba(255,255,255,.35);
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:.2s;
}

.icon:hover{transform:scale(1.08)}
.icon.active{
  background:#fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.55);
}

.glyph{
  width:22px;
  height:22px;
  background:#00a6a0;
  border-radius:4px;
}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  height:100%;
}

.header{
  height:68px;
  background:#e6f7f7;
  color:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  font-weight:800;
}

.logout{
  background:#ef4444;
  border:none;
  padding:8px 14px;
  border-radius:12px;
  color:#fff;
  cursor:pointer;
}

iframe{
  flex:1;
  width:100%;
  border:0;
  background:#fff;
}

/* ================= MOBILE NAVBAR ================= */

@media(max-width:900px){

  .app{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:74px;
    flex-direction:row;
    justify-content:space-around;
    align-items:center;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));

    background:rgba(0,194,184,.95);
    backdrop-filter:blur(14px);

    box-shadow:
      0 -8px 40px rgba(0,0,0,.35),
      inset 0 1px 0 rgba(255,255,255,.2);

    border-top-left-radius:22px;
    border-top-right-radius:22px;

    z-index:1000;
  }

  .main{
    padding-bottom:100px;
  }

  .icon{
    width:44px;
    height:44px;
    border-radius:14px;
  }

  .icon.active{
    background:#fff;
    transform:translateY(-6px);
    box-shadow:0 8px 25px rgba(0,0,0,.35);
  }

}
</style>
</head>

<body>

<section id="loginHero" class="login-hero">
  <div class="hero-overlay">
    <div class="hero-top">
      <div class="hero-title">
        <h1>CB SYSTEMS®</h1>
        <p>Sistema de Ficha Técnica & CMV</p>
      </div>
      <div class="hero-actions">
        <button class="btn primary" onclick="openLogin()">Entrar</button>
      </div>
    </div>
  </div>
</section>

<div id="modalLogin" class="modal">
  <div class="modal-box">
    <h2>Entrar no sistema</h2>
    <div class="field">
      <input id="email" type="email" placeholder="Email">
    </div>
    <div class="field" style="margin-top:10px">
      <input id="senha" type="password" placeholder="Senha">
    </div>
    <div style="margin-top:16px">
      <button class="btn primary" onclick="login()">Entrar</button>
    </div>
  </div>
</div>

<div id="app" class="app">

<aside class="sidebar">
  <div class="icon active" onclick="openPage('home.html',this)"><span class="glyph"></span></div>
  <div class="icon" onclick="openPage('fichatecnica.html',this)"><span class="glyph"></span></div>
  <div class="icon" onclick="openPage('ingredientes.html',this)"><span class="glyph"></span></div>
  <div class="icon" onclick="openPage('analiseficha.html',this)"><span class="glyph"></span></div>
  <div class="icon" onclick="openPage('config.html',this)"><span class="glyph"></span></div>
</aside>

<div class="main">
  <div class="header">
    <span id="pageTitle">CB SYSTEMS® - Dashboard</span>
    <button class="logout" onclick="logout()">Sair</button>
  </div>
  <iframe id="frame" src=""></iframe>
</div>

</div>

<script>
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

function openLogin(){
  document.getElementById("modalLogin").classList.add("open");
}

async function login(){
  const { error } = await sb.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });
  if(error){ alert(error.message); return; }
  showApp();
}

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

function showApp(){
  document.getElementById("loginHero").style.display="none";
  document.getElementById("app").style.display="grid";
  openPage("home.html", document.querySelector(".icon"));
}

function openPage(page, el){
  document.getElementById("frame").src = page;
  document.querySelectorAll(".icon").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

</script>

</body>
</html>
