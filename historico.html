<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover"/>

<title>Auditoria • CMV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>
:root{
  --primary:#2563eb;
  --danger:#dc2626;
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  padding:14px 18px;
  background:#fff;
  border-bottom:1px solid var(--border);
  font-size:15px;
  font-weight:700;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:14px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  text-align:center;
}

.card small{
  font-size:10px;
  color:var(--muted);
}

.card strong{
  font-size:16px;
  display:block;
  margin-top:2px;
  font-weight:700;
}

/* FILTROS */
.filters{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:8px;
  margin-bottom:14px;
}

.filter-group{
  display:flex;
  flex-direction:column;
}

.filter-group label{
  font-size:9px;
  color:var(--muted);
  margin-bottom:3px;
  font-weight:600;
  text-transform:uppercase;
}

.filter-group input,
.filter-group select{
  height:34px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:0 10px;
  font-size:12px;
  background:#fff;
}

.filter-group input:focus,
.filter-group select:focus{
  outline:none;
  border-color:var(--primary);
}

/* CHART */
.chart-box{
  background:#fff;
  border-radius:10px;
  border:1px solid var(--border);
  padding:10px;
  margin-bottom:14px;
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:10px;
  border:1px solid var(--border);
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#f8fafc;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  padding:8px;
}

td{
  padding:8px;
  border-top:1px solid var(--border);
}

.badge{
  font-size:9px;
  padding:3px 6px;
  border-radius:6px;
  font-weight:600;
}

.insert{background:#dcfce7;color:#166534}
.update{background:#fef3c7;color:#92400e}
.delete{background:#fee2e2;color:#991b1b}

button{
  font-size:10px;
  padding:4px 8px;
  border-radius:6px;
  border:none;
  cursor:pointer;
}

.btn-view{background:#e2e8f0}
.btn-restore{background:var(--danger);color:#fff}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:600px;
  max-height:80vh;
  overflow:auto;
  padding:16px;
  border-radius:10px;
}

.toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:#fff;
  padding:6px 12px;
  border-radius:6px;
  display:none;
  font-size:11px;
}

/* MOBILE */
@media(max-width:900px){
  .cards{grid-template-columns:1fr 1fr}
}

@media(max-width:600px){
  .filters{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">Auditoria CMV</div>

<div class="container">

<div class="cards">
  <div class="card"><small>Total</small><strong id="total">0</strong></div>
  <div class="card"><small>Insert</small><strong id="ins">0</strong></div>
  <div class="card"><small>Update</small><strong id="upd">0</strong></div>
  <div class="card"><small>Delete</small><strong id="del">0</strong></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Período</label>
    <input type="text" id="rangeData">
  </div>
  <div class="filter-group">
    <label>Operação</label>
    <select id="filtroOperacao">
      <option value="">Todas</option>
      <option value="INSERT">INSERT</option>
      <option value="UPDATE">UPDATE</option>
      <option value="DELETE">DELETE</option>
    </select>
  </div>
</div>

<div class="chart-box">
  <canvas id="grafico" height="60"></canvas>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Data</th>
<th>Tabela</th>
<th>Op</th>
<th>ID</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<button onclick="fechar()">Fechar</button>
<div id="conteudo"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let chart;
let dataInicioGlobal;
let dataFimGlobal;

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2500);
}

function fechar(){
  document.getElementById("modal").style.display="none";
}

flatpickr("#rangeData", {
  mode:"range",
  dateFormat:"Y-m-d",
  locale:"pt",
  defaultDate:[new Date().fp_incr(-7), new Date()],
  onClose:function(selectedDates){
    if(selectedDates.length===2){
      dataInicioGlobal = selectedDates[0].toISOString().slice(0,10);
      dataFimGlobal = selectedDates[1].toISOString().slice(0,10);
      carregar();
    }
  }
});

dataInicioGlobal = new Date().fp_incr(-7).toISOString().slice(0,10);
dataFimGlobal = new Date().toISOString().slice(0,10);

async function carregar(){
  let query = sb.from("historico_alteracao_fichas").select("*");

  if(dataInicioGlobal && dataFimGlobal){
    query=query.gte("alterado_em",dataInicioGlobal+"T00:00:00")
               .lte("alterado_em",dataFimGlobal+"T23:59:59");
  }

  if(filtroOperacao.value){
    query=query.eq("operacao",filtroOperacao.value);
  }

  const {data,error}=await query.order("alterado_em",{ascending:false}).limit(500);
  if(error){toast(error.message);return;}

  tbody.innerHTML="";
  total.innerText=data.length;

  let i=0,u=0,d=0;
  const dias={};

  data.forEach(r=>{
    const dia=r.alterado_em.slice(0,10);
    if(!dias[dia]) dias[dia]=0;
    dias[dia]++;

    if(r.operacao==="INSERT") i++;
    if(r.operacao==="UPDATE") u++;
    if(r.operacao==="DELETE") d++;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(r.alterado_em).toLocaleString()}</td>
      <td>${r.tabela}</td>
      <td><span class="badge ${r.operacao.toLowerCase()}">${r.operacao}</span></td>
      <td>${r.registro_id}</td>
      <td>
        <button class="btn-view" onclick='ver(${JSON.stringify(r)})'>Ver</button>
        <button class="btn-restore" onclick="restaurar('${r.id}')">Restaurar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  ins.innerText=i;
  upd.innerText=u;
  del.innerText=d;

  atualizarGrafico(dias);
}

function atualizarGrafico(dias){
  const labels=Object.keys(dias).sort();
  const valores=labels.map(l=>dias[l]);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:'bar',
    data:{labels,datasets:[{data:valores, backgroundColor:"#2563eb"}]},
    options:{plugins:{legend:{display:false}}}
  });
}

function ver(item){
  document.getElementById("modal").style.display="flex";
  conteudo.innerHTML=`<pre>${JSON.stringify(item,null,2)}</pre>`;
}

async function restaurar(id){
  const senha=prompt("Senha:");
  if(senha!=="8486"){toast("Senha incorreta");return;}
  await sb.rpc("restaurar_historico",{p_id:id});
  toast("Restaurado");
  carregar();
}

carregar();
</script>

</body>
</html>
