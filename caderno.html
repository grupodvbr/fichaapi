<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CMV Executivo Total</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#111827;
  --bg:#f3f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:14px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER COMPACTO */
.header{
  background:#fff;
  padding:8px 12px;
  display:grid;
  grid-template-columns:1fr 140px auto;
  gap:8px;
  align-items:center;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:20;
}

/* BUSCA */
.header input{
  height:34px;
  border-radius:8px;
  border:1px solid var(--border);
  padding:0 10px;
  font-size:12px;
  font-weight:600;
  background:#f9fafb;
}

/* SELECT */
.header select{
  height:34px;
  border-radius:8px;
  border:1px solid var(--border);
  padding:0 8px;
  font-size:12px;
  font-weight:600;
  background:#f9fafb;
}

/* BOTÃO */
.header button{
  height:34px;
  padding:0 12px;
  border-radius:8px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
}

/* MOBILE ULTRA AJUSTADO */
@media(max-width:600px){
  .header{
    grid-template-columns:1fr auto;
  }

  .header select{
    display:none; /* economiza espaço */
  }
}

/* CONTAINER */
.container{
  padding:14px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 8px 30px rgba(0,0,0,.05);
  border:1px solid var(--border);
}

/* HEADER CARD */
.card-header{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:16px;
  align-items:start;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  background:#000;
}

.card h2{
  margin:0 0 4px;
  font-size:18px;
  font-weight:800;
}

.card-header div > div{
  font-size:13px;
  color:var(--muted);
}

/* BADGES */
.badges{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.badge{
  background:#eef2ff;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

/* GRID FINANCEIRO */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
  margin-top:14px;
}

.box{
  background:#f9fafb;
  padding:8px 10px;
  border-radius:8px;
  font-size:12px;
}

.box b{
  font-size:11px;
  color:var(--muted);
  display:block;
  margin-bottom:2px;
}

/* SECTIONS */
.section-title{
  margin-top:18px;
  margin-bottom:8px;
  font-weight:800;
  font-size:13px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#f3f4f6;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  padding:6px;
}

td{
  padding:6px;
  border-bottom:1px solid var(--border);
  font-size:12px;
}

.total-row{
  background:#f1f5f9;
  font-weight:800;
}

/* MOBILE AJUSTES */
@media(max-width:700px){

  .header{
    flex-direction:column;
    align-items:stretch;
  }

  .header input,
  .header select,
  .header button{
    width:100%;
  }

  .card{
    padding:14px;
  }

  .card-header{
    grid-template-columns:1fr;
  }

  .card img{
    height:180px;
  }

  .card h2{
    font-size:16px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  table{
    font-size:11px;
  }

  th{
    font-size:9px;
  }

  td{
    font-size:11px;
  }
}

/* PRINT */
@media print{
  .header{display:none}
  .card{page-break-after:always}
}
</style>
</head>

<body>

<div class="header">
  <input id="search" placeholder="Buscar prato">
  <select id="tipoFilter">
    <option value="">Todos os tipos</option>
  </select>
  <button onclick="window.print()">Exportar PDF</button>
</div>

<div class="container" id="conteudo"></div>

<script>
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let pratos = [];
let itensMap = {};
let impostosMap = {};

async function carregarDados(){

  const { data: buffet } = await sb.from("buffet").select("*");
  const { data: itens } = await sb.from("buffet_itens").select("*");
  const { data: impostos } = await sb.from("impostos").select("*");

  pratos = buffet || [];

  itensMap = {};
  (itens||[]).forEach(i=>{
    if(!itensMap[i.buffet_id]) itensMap[i.buffet_id]=[];
    itensMap[i.buffet_id].push(i);
  });

  impostosMap = {};
  (impostos||[]).forEach(i=>{
    if(!impostosMap[i.buffet_id]) impostosMap[i.buffet_id]=[];
    impostosMap[i.buffet_id].push(i);
  });

  popularTipos();
  aplicarFiltros();
}

function popularTipos(){
  const tipos=[...new Set(pratos.map(p=>p.tipo).filter(Boolean))];
  tipoFilter.innerHTML="<option value=''>Todos</option>"+
    tipos.map(t=>`<option value="${t}">${t}</option>`).join("");
}

function aplicarFiltros(){
  const nome=search.value.toUpperCase();
  const tipo=tipoFilter.value;

  const filtrados=pratos.filter(p=>{
    const nomeOk=!nome||p.nome.toUpperCase().includes(nome);
    const tipoOk=!tipo||p.tipo===tipo;
    return nomeOk&&tipoOk;
  });

  render(filtrados);
}

function render(lista){
  conteudo.innerHTML="";

  lista.forEach(p=>{

    const itens=itensMap[p.id]||[];
    const impostos=impostosMap[p.id]||[];

    const cmvBase=itens.reduce((s,i)=>s+Number(i.custo_calculado||0),0);

    let totalImp=0;
    impostos.forEach(i=>{
      if(i.modalidade==="FIXO") totalImp+=Number(i.valor);
      if(i.modalidade==="PERCENTUAL")
        totalImp+=(cmvBase*Number(i.valor))/100;
    });

    const custoFinal=cmvBase+totalImp;
    const preco=Number(p.preco_venda||0);
    const lucro=preco-custoFinal;
    const margem=preco?(lucro/preco)*100:0;
    const cmvPerc=preco?(cmvBase/preco)*100:0;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="card-header">
        <img src="${p.foto_url||'https://placehold.co/600x400?text=Sem+Foto'}">
        <div>
          <h2>${p.nome}</h2>
          <div>${p.descricao||""}</div>

          <div class="badges">
            <div class="badge">Tipo: ${p.tipo||"-"}</div>
            <div class="badge">Status: ${p.ativo?"Ativo":"Inativo"}</div>
            <div class="badge">Código: ${p.codigo_varejo||"-"}</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="box"><b>Preço Venda</b><br>R$ ${preco.toFixed(2)}</div>
        <div class="box"><b>Preço Ideal</b><br>R$ ${Number(p.preco_ideal||0).toFixed(2)}</div>
        <div class="box"><b>Custo Base</b><br>R$ ${cmvBase.toFixed(2)}</div>
        <div class="box"><b>Custo Final</b><br>R$ ${custoFinal.toFixed(2)}</div>
        <div class="box"><b>CMV</b><br>${cmvPerc.toFixed(1)}%</div>
        <div class="box"><b>Lucro</b><br>R$ ${lucro.toFixed(2)}</div>
        <div class="box"><b>Margem</b><br>${margem.toFixed(1)}%</div>
      </div>

      <div class="section-title">Ingredientes</div>
      <table>
        <tr>
          <th>Nome</th>
          <th>Qtd</th>
          <th>Un.</th>
          <th>Custo Unit.</th>
          <th>Custo Total</th>
        </tr>
        ${itens.map(i=>{
          const qtd=Number(i.quantidade||0);
          const custoUnit=Number(i.custo_unitario||0);
          const total=qtd*custoUnit;
          return `
            <tr>
              <td>${i.nome}</td>
<td>${qtd.toFixed(4)}</td>
<td>${i.unidade_uso}</td>
              <td>R$ ${custoUnit.toFixed(2)}</td>
              <td><b>R$ ${total.toFixed(2)}</b></td>
            </tr>
          `;
        }).join("")}
        <tr class="total-row">
          <td colspan="4">Total Ingredientes</td>
          <td>R$ ${cmvBase.toFixed(2)}</td>
        </tr>
      </table>

      <div class="section-title">Impostos / Custos</div>
      <table>
        <tr><th>Descrição</th><th>Tipo</th><th>Modalidade</th><th>Valor</th></tr>
        ${impostos.map(i=>`
          <tr>
            <td>${i.descricao}</td>
            <td>${i.tipo}</td>
            <td>${i.modalidade}</td>
            <td>${i.modalidade==="PERCENTUAL"?i.valor+"%":"R$ "+Number(i.valor).toFixed(2)}</td>
          </tr>
        `).join("")}
      </table>

      <div class="section-title">Modo de Preparo</div>
      <div>${p.modo_preparo||"-"}</div>
    `;

    conteudo.appendChild(div);
  });
}

search.oninput=aplicarFiltros;
tipoFilter.onchange=aplicarFiltros;

carregarDados();
</script>

</body>
</html>
