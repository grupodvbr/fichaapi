<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Fichas Técnicas • Mercatto</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  font-family:'Inter',sans-serif;
  background:#f1f5f9;
  overflow:hidden;
}

/* ===== STRUCT ===== */
.app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* ===== HEADER ===== */
.filters{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #e2e8f0;
}

.filters input,
.filters select{
  height:48px;
  border-radius:14px;
  border:1px solid #e2e8f0;
  padding:0 14px;
  font-weight:700;
}

/* ===== GRID ===== */
.grid{
  flex:1;
  overflow:auto;
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
  transition:.2s;
}

.card:active{
  transform:scale(.96);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.card-body h3{
  font-size:13px;
  font-weight:900;
}

.badges{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.badge{
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:900;
}

.ok{background:#dcfce7;color:#166534}
.warn{background:#fee2e2;color:#991b1b}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:100;
}

.modal-box{
  height:100%;
  background:#fff;
  overflow:auto;
}

.modal img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.modal-body{
  padding:16px;
}

.modal-body h2{
  font-size:20px;
  margin-bottom:10px;
}

/* ===== TEXTAREA ===== */
textarea{
  width:100%;
  min-height:140px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  padding:12px;
  font-weight:700;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  font-weight:900;
  margin-top:10px;
}

.btn-save{
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:#fff;
}

/* ===== UPLOAD ===== */
.upload label{
  height:48px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-weight:900;
  margin-bottom:10px;
}

.ing{
  border-bottom:1px dashed #e2e8f0;
  padding:6px 0;
  font-size:13px;
}

.close{
  position:absolute;
  top:10px;
  right:14px;
  color:#fff;
  font-size:22px;
  font-weight:900;
}

/* ===== LOADING ===== */
.loading{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  z-index:200;
}

</style>
</head>

<body>

<div class="app">

<div class="filters">
  <input id="filtroNome" placeholder="🔍 BUSCAR PRATO">
  <select id="filtroTipo">
    <option value="">TODOS</option>
    <option>SUSHI</option>
    <option>DRINK</option>
    <option>ENTRADA</option>
    <option>PRATO PRINCIPAL</option>
    <option>SOBREMESA</option>
  </select>
  <select id="filtroReceita">
    <option value="">TODAS</option>
    <option value="COM">COM RECEITA</option>
    <option value="SEM">SEM RECEITA</option>
  </select>
</div>

<div id="cards" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="fechar()">✕</span>
    <img id="mFoto">
    <div id="mBody" class="modal-body"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="loading">CARREGANDO...</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let pratos = [];
let pratoAtual = null;

/* ===== LOAD ===== */
async function carregar(){

  loading.style.display="flex";

  try{
    const { data, error } = await sb
      .from("buffet")
      .select("*")
      .order("nome");

    if(error) throw error;

    pratos = data || [];
    render();

  }catch(e){
    alert("Erro ao carregar dados");
    console.error(e);
  }

  loading.style.display="none";
}

/* ===== RENDER ===== */
function render(){

  cards.innerHTML="";

  const nome = filtroNome.value.toUpperCase();
  const tipo = filtroTipo.value;
  const receita = filtroReceita.value;

  pratos.forEach(p=>{

    if(nome && !p.nome.toUpperCase().includes(nome)) return;
    if(tipo && p.tipo !== tipo) return;
    if(receita==="COM" && !p.modo_preparo) return;
    if(receita==="SEM" && p.modo_preparo) return;

    const c = document.createElement("div");
    c.className="card";
    c.onclick=()=>abrir(p);

    c.innerHTML=`
      ${p.foto_url ? `<img src="${p.foto_url}">` : ``}
      <div class="card-body">
        <h3>${p.nome}</h3>
        <div class="badges">
          <span class="badge">${p.tipo||"-"}</span>
          ${p.modo_preparo
            ? `<span class="badge ok">COM RECEITA</span>`
            : `<span class="badge warn">SEM RECEITA</span>`}
        </div>
      </div>
    `;

    cards.appendChild(c);

  });
}

/* ===== OPEN ===== */
async function abrir(p){

  pratoAtual = p;
  modal.style.display="block";
  mFoto.src = p.foto_url || "";

  const { data: itens } = await sb
    .from("buffet_itens")
    .select("*")
    .eq("buffet_id", p.id);

  mBody.innerHTML=`
    <h2>${p.nome}</h2>

    <div class="upload">
      <label for="fotoInput">📷 TROCAR FOTO</label>
      <input type="file" id="fotoInput" accept="image/*" onchange="uploadFoto(event)">
    </div>

    <h3>MODO DE PREPARO</h3>

    <textarea id="receitaInput">${p.modo_preparo||""}</textarea>

    <button class="btn btn-save" onclick="salvarReceita()">
      SALVAR RECEITA
    </button>

    <h3>INGREDIENTES</h3>

    ${(itens || []).map(i=>`
      <div class="ing">
        ${i.nome} • ${i.quantidade} ${i.unidade_uso}
      </div>
    `).join("")}
  `;
}

/* ===== SAVE ===== */
async function salvarReceita(){

  const texto = receitaInput.value.trim().toUpperCase();

  if(!texto){
    alert("Digite a receita");
    return;
  }

  await sb
    .from("buffet")
    .update({ modo_preparo: texto })
    .eq("id", pratoAtual.id);

  await carregar();
  fechar();
}

/* ===== FOTO ===== */
async function uploadFoto(e){

  const file = e.target.files[0];
  if(!file) return;

  const nomeArquivo =
    pratoAtual.id + "-" + Date.now() + ".jpg";

  const { error } = await sb.storage
    .from("buffet")
    .upload(nomeArquivo, file, { upsert:true });

  if(error){
    alert("Erro ao enviar imagem");
    console.error(error);
    return;
  }

  const { data } = sb.storage
    .from("buffet")
    .getPublicUrl(nomeArquivo);

  const url = data.publicUrl;

  await sb
    .from("buffet")
    .update({ foto_url: url })
    .eq("id", pratoAtual.id);

  mFoto.src = url;
}

/* ===== CLOSE ===== */
function fechar(){
  modal.style.display="none";
}

/* ===== EVENTS ===== */
filtroNome.oninput = render;
filtroTipo.onchange = render;
filtroReceita.onchange = render;

/* ===== INIT ===== */
carregar();

</script>

</body>
</html>
