<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover"/>

<title>Auditoria • Sistema CMV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --danger:#dc2626;
  --success:#16a34a;
  --warning:#f59e0b;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --radius:16px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  font-family:Inter,system-ui;
  background:linear-gradient(180deg,#f8fafc,#eef2f7);
  color:var(--text);
  overflow-x:hidden;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:auto;
  padding:30px 20px;
}

h1{
  margin:0;
  font-weight:900;
  font-size:26px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:25px;
  font-weight:600;
  font-size:13px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:25px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:var(--radius);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  text-align:center;
}

.card small{
  font-size:11px;
  color:var(--muted);
}

.card strong{
  display:block;
  font-size:22px;
  margin-top:4px;
}

/* TABLE */
.table-wrap{
  background:#fff;
  border-radius:var(--radius);
  overflow:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
}

th{
  font-size:11px;
  text-transform:uppercase;
  color:var(--muted);
  background:#f8fafc;
}

tr:hover{
  background:#f8fafc;
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
}

.insert{background:#dcfce7;color:#166534}
.update{background:#fef9c3;color:#854d0e}
.delete{background:#fee2e2;color:#991b1b}

.linked-indicator{
  background:var(--warning);
  color:#fff;
  padding:3px 8px;
  font-size:9px;
  border-radius:999px;
  margin-left:6px;
}

/* BUTTONS */
button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
}

.btn-secondary{background:#e2e8f0}
.btn-danger{background:var(--danger);color:#fff}
.btn-primary{background:var(--primary);color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
  border-radius:16px;
  padding:20px;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.diff{
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  background:#f8fafc;
}

.old{color:var(--danger);font-weight:800}
.new{color:var(--success);font-weight:800}

.value{
  background:#0f172a;
  color:#fff;
  padding:8px;
  border-radius:6px;
  font-size:12px;
  margin-top:4px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:10px 18px;
  border-radius:10px;
  display:none;
  font-size:12px;
}

/* MOBILE */
@media(max-width:900px){

  .cards{
    grid-template-columns:repeat(2,1fr);
  }

  table{
    font-size:11px;
  }

  th,td{
    padding:8px;
  }

  td:last-child{
    display:flex;
    flex-direction:column;
    gap:5px;
  }

}
</style>
</head>

<body>

<div class="container">

<h1>Auditoria e Backup</h1>
<div class="subtitle">Últimos 30 dias</div>

<div class="cards">
  <div class="card"><small>Total</small><strong id="total">0</strong></div>
  <div class="card"><small>Inserts</small><strong id="ins">0</strong></div>
  <div class="card"><small>Updates</small><strong id="upd">0</strong></div>
  <div class="card"><small>Deletes</small><strong id="del">0</strong></div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Data</th>
<th>Tabela</th>
<th>Operação</th>
<th>ID</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-header">
<strong>Detalhes</strong>
<button class="btn-secondary" onclick="fechar()">Fechar</button>
</div>
<div id="conteudo"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://dxkszikemntfusfyrzos.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

function fechar(){
  document.getElementById("modal").style.display="none";
  document.body.style.overflow="auto";
}

function data30(){
  const d=new Date();
  d.setDate(d.getDate()-30);
  return d.toISOString();
}

async function carregar(){

  const {data,error}=await sb
    .from("historico_alteracao_fichas")
    .select("*")
    .gte("alterado_em",data30())
    .order("alterado_em",{ascending:false})
    .limit(500);

  if(error){ toast(error.message); return; }

  const grupos={};
  data.forEach(r=>{
    if(!grupos[r.alterado_em]) grupos[r.alterado_em]=0;
    grupos[r.alterado_em]++;
  });

  tbody.innerHTML="";
  total.innerText=data.length;

  let i=0,u=0,d=0;

  data.forEach(r=>{

    if(r.operacao==="INSERT") i++;
    if(r.operacao==="UPDATE") u++;
    if(r.operacao==="DELETE") d++;

    const vinculado = grupos[r.alterado_em] > 1;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(r.alterado_em).toLocaleString()}</td>
      <td>${r.tabela}</td>
      <td>
        <span class="badge ${r.operacao.toLowerCase()}">${r.operacao}</span>
        ${vinculado ? '<span class="linked-indicator">VINCULADO</span>' : ''}
      </td>
      <td>${r.registro_id}</td>
      <td>
        <button class="btn-secondary" onclick='ver(${JSON.stringify(r)})'>Ver</button>
        <button class="btn-danger" onclick="restaurarIndividual(this,'${r.id}')">Restaurar</button>
      </td>
    `;
    tbody.appendChild(tr);

  });

  ins.innerText=i;
  upd.innerText=u;
  del.innerText=d;
}

function ver(item){
  document.getElementById("modal").style.display="flex";
  document.body.style.overflow="hidden";

  let html="";

  if(item.operacao==="UPDATE"){
    const antes=item.dados_antes||{};
    const depois=item.dados_depois||{};
    Object.keys(depois).forEach(k=>{
      if(JSON.stringify(antes[k])!==JSON.stringify(depois[k])){
        html+=`
        <div class="diff">
          <strong>${k}</strong>
          <div class="old">ANTES</div>
          <div class="value">${antes[k]}</div>
          <div class="new">DEPOIS</div>
          <div class="value">${depois[k]}</div>
        </div>`;
      }
    });
  } else {
    html=`<pre>${JSON.stringify(item.dados_depois||item.dados_antes,null,2)}</pre>`;
  }

  document.getElementById("conteudo").innerHTML=html;
}

async function restaurarIndividual(btn,id){
  const senha=prompt("Senha:");
  if(senha!=="8486"){ toast("Senha incorreta"); return; }

  btn.disabled=true;
  btn.innerText="Restaurando...";

  const {error}=await sb.rpc("restaurar_historico",{p_id:id});

  if(error){
    toast(error.message);
    btn.disabled=false;
    btn.innerText="Restaurar";
    return;
  }

  toast("Registro restaurado");
  fechar();
  carregar();
}

carregar();

/* BLOQUEIO TOTAL ZOOM */
document.addEventListener('gesturestart', e=>e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){
  const now=new Date().getTime();
  if(now-lastTouchEnd<=300){e.preventDefault();}
  lastTouchEnd=now;
},{passive:false});
document.addEventListener('wheel',e=>{
  if(e.ctrlKey)e.preventDefault();
},{passive:false});
</script>

</body>
</html>
